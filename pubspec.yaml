name: vitalglyph
description: Offline-first emergency medical ID app — no accounts, no servers.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Routing
  go_router: ^14.8.1

  # Dependency injection
  get_it: ^8.0.3

  # Security
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0
  wakelock_plus: ^1.4.0

  # Crypto (HMAC for QR integrity)
  crypto: ^3.0.7

  # Utilities
  uuid: ^4.5.1
  dartz: ^0.10.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
