name: vitalglyph
description: Offline-first emergency medical ID app — no accounts, no servers.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  crypto: ^3.0.7
  drift: ^2.21.0
  encrypt: ^5.0.3
  equatable: ^2.0.7
  file_picker: ^8.0.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  fpdart: ^1.2.0
  get_it: ^8.0.3
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  home_widget: ^0.6.0
  image_picker: ^1.1.2
  intl: any
  local_auth: ^3.0.1
  mobile_scanner: ^7.0.0
  package_info_plus: ^9.0.0
  path: ^1.9.0
  path_provider: ^2.1.5
  pdf: ^3.10.0
  printing: ^5.12.0
  qr_flutter: ^4.1.0
  screen_protector: ^1.5.1
  share_plus: ^12.0.1
  sqlcipher_flutter_libs: '>=0.6.0 <0.7.0'
  sqlite3: ^2.4.0
  uuid: ^4.5.1
  wakelock_plus: ^1.4.0

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
